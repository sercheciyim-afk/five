<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Курбан Байрам</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="scroll-hero" aria-label="Праздничное поздравление">
        <div class="hero-stage">
          <video
            class="hero-video hero-video-desktop"
            muted
            playsinline
            preload="auto"
            poster=""
            aria-hidden="true"
          >
            <source
              src="https://dl.dropbox.com/scl/fi/5k6pfgx6th0op6rhdqbru/bayram-desktop-hq.mp4?rlkey=62rr9e0o043qk8rg1jer65kw4&st=nkxdnid6&raw=1"
              type="video/mp4"
            />
          </video>

          <video
            class="hero-video hero-video-mobile"
            muted
            playsinline
            preload="auto"
            poster=""
            aria-hidden="true"
          >
            <source
              src="https://dl.dropbox.com/scl/fi/f4u2cldm0wo5e9zsm6kwz/bayram-mobile-hq.mp4?rlkey=7j7j48t9ixa18hc81f8kho0ml&st=f0kncbzr&raw=1"
              type="video/mp4"
            />
          </video>

          <div class="hero-shade" aria-hidden="true"></div>

          <div class="hero-copy">
            <p class="arabic-title" dir="rtl" lang="ar">عيد أضحى مبارك</p>
            <h1>Я сделала для тебя подарок</h1>
            <p class="subtitle">Создай праздничное поздравление для своих близких</p>
            <a class="hero-button" href="#create">Создать поздравление</a>
          </div>
        </div>
      </section>

      <section class="next-section" id="create" aria-label="Создание поздравления">
        <div class="next-inner">
          <h2>Праздничное поздравление</h2>
          <p>Здесь можно продолжить сценарий создания открытки или формы поздравления.</p>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
